server {
    listen 80;
    server_name wahasend.linkwise.digital;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name wahasend.linkwise.digital;

    # SSL certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/wahasend.linkwise.digital/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wahasend.linkwise.digital/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy settings
    location / {
        proxy_pass http://127.0.0.1:3041;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Increase max body size for file uploads (spreadsheets, images, documents)
    client_max_body_size 20M;
}
